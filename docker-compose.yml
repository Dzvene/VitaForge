services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: baseline
      POSTGRES_PASSWORD: baseline
      POSTGRES_DB: baseline
    ports:
      - "5433:5432"   # 5433 on host to avoid clashing with a local PG18
    volumes:
      - baseline_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseline"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  baseline_pg:
